<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Employee Leave Portal</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .header {
            width: 100%;
            background: rgba(255,255,255,0.05);
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .header h1 { color: #e94560; font-size: 24px; font-weight: 700; }
        .header a {
            color: #fff;
            text-decoration: none;
            background: #e94560;
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 14px;
        }
        .container {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 40px;
            width: 520px;
            margin-top: 60px;
        }
        .container h2 { color: #fff; margin-bottom: 30px; font-size: 22px; text-align: center; }
        .form-group { margin-bottom: 20px; }
        label { display: block; color: #aaa; margin-bottom: 6px; font-size: 13px; text-transform: uppercase; letter-spacing: 1px; }
        input, select, textarea {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 8px;
            color: #fff;
            font-size: 14px;
            outline: none;
            transition: border 0.3s;
        }
        input:focus, select:focus, textarea:focus { border-color: #e94560; }
        select option { background: #1a1a2e; }
        textarea { resize: none; height: 80px; }
        .row { display: flex; gap: 16px; }
        .row .form-group { flex: 1; }
        button[type="submit"] {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #e94560, #c23152);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            transition: opacity 0.3s;
        }
        button[type="submit"]:hover { opacity: 0.85; }
    </style>
</head>
<body>
    <div class="header">
        <h1>🏢 Employee Leave Portal</h1>
        <a href="/requests">View All Requests</a>
    </div>
    <div class="container">
        <h2>Submit Leave Request</h2>
        <form th:action="@{/submit}" th:object="${leaveRequest}" method="post">
            <div class="row">
                <div class="form-group">
                    <label>Employee Name</label>
                    <input type="text" th:field="*{employeeName}" placeholder="Your name" required/>
                </div>
                <div class="form-group">
                    <label>Employee ID</label>
                    <input type="text" th:field="*{employeeId}" placeholder="EMP001" required/>
                </div>
            </div>
            <div class="form-group">
                <label>Leave Type</label>
                <select th:field="*{leaveType}">
                    <option value="Sick Leave">🤒 Sick Leave</option>
                    <option value="Casual Leave">🌴 Casual Leave</option>
                    <option value="Annual Leave">✈️ Annual Leave</option>
                    <option value="Emergency Leave">🚨 Emergency Leave</option>
                </select>
            </div>
            <div class="row">
                <div class="form-group">
                    <label>From Date</label>
                    <input type="date" th:field="*{fromDate}" required/>
                </div>
                <div class="form-group">
                    <label>To Date</label>
                    <input type="date" th:field="*{toDate}" required/>
                </div>
            </div>
            <div class="form-group">
                <label>Reason</label>
                <textarea th:field="*{reason}" placeholder="Brief reason for leave..."></textarea>
            </div>
            <button type="submit">Submit Request →</button>
        </form>
    </div>
</body>
</html>
